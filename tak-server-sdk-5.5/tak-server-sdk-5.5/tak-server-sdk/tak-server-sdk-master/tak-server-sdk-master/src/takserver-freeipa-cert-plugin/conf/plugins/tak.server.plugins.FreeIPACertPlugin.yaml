# ─────────────────────────────────────────────────────────────────────────────
# FreeIPA Certificate Enrollment Plugin – configuration
# Location: /opt/tak/conf/plugins/tak.server.plugins.FreeIPACertPlugin.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── FreeIPA server ────────────────────────────────────────────────────────────
# Base URL of your FreeIPA server (must use HTTPS in production)
freeIpaUrl: https://ipa.example.com

# Kerberos realm – must match your FreeIPA installation (always uppercase)
freeIpaRealm: EXAMPLE.COM

# Plugin admin account used to issue certificates via the FreeIPA API.
# This account needs the "Certificate Administrators" or equivalent role.
freeIpaAdminUser: admin
freeIpaAdminPassword: changeme

# FreeIPA certificate profile to use when signing client certificates.
# "userCert" is the correct profile for end-user client certificates.
# "caIPAserviceCert" is for host/service TLS certs and will be rejected for user principals.
# Create a custom profile in FreeIPA if you need specific key usages / SANs.
freeIpaCertProfile: userCert

# FreeIPA CA authority CN.  "ipa" is the root CA in a standard install.
# Change this only if you have configured a sub-CA in FreeIPA.
freeIpaCaCn: ipa

# ── TLS trust for connections to FreeIPA ──────────────────────────────────────
# Path to a PKCS12 trust-store that contains the FreeIPA CA certificate.
# Leave commented out to rely on the JVM default trust store (system CAs).
# freeIpaTruststorePath: /opt/tak/certs/freeipa-ca-trust.p12
# freeIpaTruststorePassword: changeme

# Set to true ONLY in isolated lab environments – disables TLS cert verification
# towards FreeIPA.  NEVER enable in production.
skipFreeIpaTlsVerify: false

# ── Enrollment HTTPS server ───────────────────────────────────────────────────
# Port 8446 is the standard TAK Server certificate-enrollment port.
# This plugin runs on 8446 as a drop-in replacement – ATAK users enroll exactly
# as before with no client-side changes required.
#
# IMPORTANT: Before deploying, remove TAK Server's built-in enrollment connector
# so this plugin can bind to port 8446.
#
# The CoreConfig.xml schema has NO "enabled" attribute on <connector> — you must
# remove (or comment out) the entire element, then restart TAK Server:
#
#   Before:  <connector port="8446" _name="cert_https" ... />
#   After:   <!-- removed: FreeIPA enrollment plugin binds this port instead -->
#
# ALSO required: import the FreeIPA CA certificate into TAK Server's truststore
# so that FreeIPA-signed client certificates are accepted on port 8443:
#
#   keytool -importcert -trustcacerts -alias freeipa-ca \
#     -file /etc/ipa/ca.crt \
#     -keystore /opt/tak/certs/truststore-root.jks \
#     -storepass atakatak
#
# Then restart TAK Server.
enrollmentPort: 8446

# ── TLS server identity for the enrollment endpoint ──────────────────────────
# ATAK clients see this certificate when they connect to port 8446.
# Two options – uncomment ONE block and comment out the other.
#
# OPTION A – FreeIPA-issued server certificate (recommended if you already
# install the FreeIPA CA on every device via an MDM/profile):
#
#   Pros:  single CA for both the enrollment endpoint and issued client certs.
#   Cons:  ATAK will show a TLS warning on first connect until the FreeIPA CA
#          is trusted.  Import it once with:
#            keytool -importcert -trustcacerts -alias freeipa-ca \
#              -file /etc/ipa/ca.crt \
#              -keystore /opt/tak/certs/truststore-root.jks \
#              -storepass atakatak
#          then restart TAK Server.
#
keystorePath: /opt/tak/certs/server.p12
keystorePassword: atakatak
#
# OPTION B – Let's Encrypt certificate (ATAK trusts it natively, no pre-config
# needed on the device – ideal when you cannot push a CA profile):
#
#   Pros:  zero client-side setup; ATAK trusts LE out of the box.
#   Cons:  cert expires every 90 days – automate renewal with certbot and
#          send SIGHUP to reload without restarting (see certbot deploy hook
#          example in the reloadSslContext() Javadoc).
#
#   Build the PKCS12 after certbot renews:
#     openssl pkcs12 -export \
#       -in  /etc/letsencrypt/live/takserver.example.com/fullchain.pem \
#       -inkey /etc/letsencrypt/live/takserver.example.com/privkey.pem \
#       -out /opt/tak/certs/enrollment-le.p12 \
#       -passout pass:atakatak
#
# keystorePath: /opt/tak/certs/enrollment-le.p12
# keystorePassword: atakatak

# ── Issued certificate settings ───────────────────────────────────────────────
# Password set on the PKCS12 bundle returned to ATAK clients.
# "atakatak" is the TAK ecosystem convention; change if your deployment differs.
certPassword: atakatak

# X.500 subject fields embedded in each client certificate
certOrganisation: TAK
certCountry: US

# RSA key size for generated client key pairs.  2048 is widely supported;
# use 4096 for higher security at the cost of slightly slower enrollment.
rsaKeySize: 2048
